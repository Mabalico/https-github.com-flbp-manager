name: Deploy player-alias-alert Edge Function

on:
  workflow_dispatch:
    inputs:
      project_ref:
        description: Supabase project ref
        required: true
        default: kgwhcemqkgqvtsctnwql
      confirm:
        description: Type RUN to deploy the Edge Function
        required: true
        default: 'NO'

jobs:
  deploy:
    if: ${{ github.event.inputs.confirm == 'RUN' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Validate required secret
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN" || {
            echo "::error::Missing GitHub secret SUPABASE_ACCESS_TOKEN"
            exit 1
          }

      - name: Deploy player-alias-alert
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ github.event.inputs.project_ref }}
        run: |
          set -euo pipefail
          supabase functions deploy player-alias-alert --project-ref "$PROJECT_REF" --use-api --workdir "FLBP ONLINE"
